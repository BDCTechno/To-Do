<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <style>
    :root{--bg:#f4f6fb;--surface:#fff;--surface2:#f9fafc;--text:#111827;--muted:#6b7280;--border:rgba(17,24,39,.08);--red:#dc2626;--red2:#b91c1c;--shadow:0 16px 40px rgba(15,23,42,.12);--radius:18px}
    [data-theme=dark]{--bg:#0f1117;--surface:#181b23;--surface2:#202534;--text:#eef2ff;--muted:#a1a7b5;--border:rgba(255,255,255,.08);--red:#ef4444;--red2:#f87171;--shadow:0 18px 50px rgba(0,0,0,.38)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)} button,input,select{font:inherit} button{cursor:pointer;border:0} .wrap{max-width:1220px;margin:0 auto;padding:24px;display:grid;grid-template-columns:300px 1fr;gap:22px} .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}
    .side{padding:18px;position:sticky;top:24px;height:fit-content}.brand{display:flex;align-items:center;justify-content:space-between}.brand h1{font-size:1.15rem;margin:0}.icon{width:42px;height:42px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;color:var(--text)}
    .section{margin-top:18px}.label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:10px}.row{display:grid;grid-template-columns:1fr auto;gap:10px}.input,.select{width:100%;padding:.95rem 1rem;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text);outline:none}.input:focus,.select:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(220,38,38,.12)}
    .addcat{height:48px;padding:0 16px;border-radius:14px;background:var(--red);color:#fff;font-weight:800;display:inline-flex;align-items:center;justify-content:center;line-height:1;transform:translateY(1px)} .cats{display:grid;gap:10px;margin-top:12px}.cat{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 14px;border-radius:16px;background:var(--surface2);border:1px solid var(--border)} .catname{display:flex;align-items:center;gap:10px;min-width:0;font-weight:700}.dot{width:10px;height:10px;border-radius:999px;flex:0 0 auto}
    .actions{display:flex;gap:8px}.mini{width:36px;height:36px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;color:var(--text)}
    .main{padding:24px;min-height:calc(100vh - 48px)} .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}.top h2{margin:0;font-size:2rem}.top p{margin:.4rem 0 0;color:var(--muted)} .toolbar{display:grid;grid-template-columns:1.2fr .9fr .9fr;gap:12px;margin:18px 0} .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0} .stat{padding:18px;background:var(--surface2);border:1px solid var(--border);border-radius:18px} .stat .k{color:var(--muted);font-size:.9rem}.stat .v{font-size:1.7rem;font-weight:900;margin-top:8px}
    .progress{padding:16px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:18px;margin-bottom:20px}.bar{height:10px;background:rgba(107,114,128,.18);border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),#ff8a8a)} .prow{display:flex;justify-content:space-between;color:var(--muted);margin-bottom:10px}
    .group{background:var(--surface2);border:1px solid var(--border);border-radius:22px;overflow:hidden;margin-bottom:16px}.ghead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}.ghead h3{margin:0;display:flex;gap:10px;align-items:center}.count{font-size:.85rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:6px 10px;border-radius:999px} .tasks{display:grid}.task{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:16px 18px;align-items:center;border-top:1px solid var(--border)} .task:first-child{border-top:0}.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:grid;place-items:center;color:#fff}.check.on{background:#16a34a;border-color:#16a34a}.title{font-weight:700;cursor:pointer;word-break:break-word}.title.done{text-decoration:line-through;color:var(--muted)} .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.pill{font-size:.78rem;padding:5px 9px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-weight:700}.p1{color:#2563eb}.p2{color:#b45309}.p3{color:var(--red)} .over{color:var(--red);background:rgba(220,38,38,.1);border-color:transparent}.soon{color:#b45309;background:rgba(245,158,11,.12);border-color:transparent}
    .btn{border-radius:14px;padding:10px 14px;font-weight:800}.primary{background:var(--red);color:#fff}.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)} .empty{padding:46px 18px;text-align:center;color:var(--muted)}
    .fab{position:fixed;right:24px;bottom:24px;width:64px;height:64px;border-radius:50%;background:var(--red);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow);z-index:40;font-size:2rem;line-height:0}
    .modalbg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modalbg.open{display:flex}.modal{width:min(560px,100%);background:var(--surface);border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}.mhead{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}.mbody{padding:20px;display:grid;gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.mactions{display:flex;justify-content:flex-end;gap:10px;padding:0 20px 20px}
    @media(max-width:980px){.wrap{grid-template-columns:1fr}.side{position:static}.toolbar,.stats{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}} @media(max-width:640px){.wrap{padding:14px}.main,.side{padding:16px}.task{grid-template-columns:auto 1fr}.task .actions{grid-column:2}.fab{right:16px;bottom:16px;width:58px;height:58px}}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="card side">
      <div class="brand"><h1>TaskFlow</h1><button class="icon" id="themeBtn">☾</button></div>
      <div class="section">
        <div class="label">Categories</div>
        <div class="row"><input class="input" id="catInput" placeholder="New category"><button class="addcat" id="addCatBtn">Add</button></div>
        <div class="cats" id="catList"></div>
      </div>
    </aside>
    <main class="card main">
      <div class="top"><div><h2>Tasks</h2><p>Hidden add form, category colors, edit, due dates, and local storage.</p></div><button class="btn secondary" id="clearDone">Clear completed</button></div>
      <div class="stats"><div class="stat"><div class="k">Total</div><div class="v" id="total">0</div></div><div class="stat"><div class="k">Completed</div><div class="v" id="done">0</div></div><div class="stat"><div class="k">Remaining</div><div class="v" id="left">0</div></div></div>
      <div class="toolbar"><input class="input" id="search" placeholder="Search tasks"><select class="select" id="filter"><option value="all">Show: All</option><option value="active">Show: Active</option><option value="completed">Show: Completed</option><option value="due-soon">Show: Due soon</option></select><select class="select" id="sort"><option value="newest">Sort: Newest</option><option value="oldest">Sort: Oldest</option><option value="priority-high">Sort: Priority high to low</option><option value="priority-low">Sort: Priority low to high</option></select></div>
      <div class="progress"><div class="prow"><span>Progress</span><span id="pct">0% complete</span></div><div class="bar"><div class="fill" id="fill"></div></div></div>
      <div id="groups"></div>
    </main>
  </div>

  <button class="fab" id="openTask" aria-label="Add task">+</button>

  <div class="modalbg" id="taskBg"><div class="modal"><div class="mhead"><h3 id="modalTitle">New task</h3><button class="icon" id="closeTask">✕</button></div><div class="mbody"><input class="input" id="taskTitle" placeholder="What needs to get done?"><div class="grid2"><select class="select" id="taskCat"></select><select class="select" id="taskPri"><option value="1">Priority: Low</option><option value="2" selected>Priority: Medium</option><option value="3">Priority: High</option></select></div><input class="input" type="date" id="taskDue"></div><div class="mactions"><button class="btn secondary" id="cancelTask">Cancel</button><button class="btn primary" id="saveTask">Add task</button></div></div></div>

  <script>
    const store={get:(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return window.__mem?.[k]??f}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{window.__mem=window.__mem||{};window.__mem[k]=v}}};
    const colors=['#dc2626','#2563eb','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#475569'];
    let categories=store.get('tf-cats',[{name:'General',color:colors[0]},{name:'School',color:colors[1]},{name:'Home',color:colors[2]},{name:'Fitness',color:colors[3]}]);
    if(!Array.isArray(categories)) categories=[{name:'General',color:colors[0]}];
    if(!categories.some(c=>c.name==='General')) categories.unshift({name:'General',color:colors[0]});
    let tasks=store.get('tf-tasks',[]); if(!Array.isArray(tasks)) tasks=[];
    let ui=store.get('tf-ui',{theme:'light',search:'',filter:'all',sort:'newest'}); let editId=null;
    const $=id=>document.getElementById(id);
    const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const save=()=>{store.set('tf-cats',categories);store.set('tf-tasks',tasks);store.set('tf-ui',ui)};
    const applyTheme=()=>{document.documentElement.setAttribute('data-theme',ui.theme||'light');$('themeBtn').textContent=(ui.theme||'light')==='dark'?'☀':'☾'};
    const catColor=name=>(categories.find(c=>c.name===name)||{color:colors[0]}).color;
    const catNames=()=>categories.map(c=>c.name);
    const updateTaskCat=()=>{$('taskCat').innerHTML=catNames().map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')};
    const dueState=(due,done)=>{if(!due||done)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due+'T00:00:00');const diff=Math.round((d-t)/86400000);if(diff<0)return['over','Overdue'];if(diff<=2)return['soon',diff===0?'Due today':diff===1?'Due tomorrow':'Due soon'];return null};
    const renderCats=()=>{updateTaskCat(); $('catList').innerHTML=categories.map(c=>`<div class="cat"><div class="catname"><span class="dot" style="background:${c.color}"></span><span>${esc(c.name)}</span></div><div class="actions">${c.name!=='General'?`<button class="mini" data-cust="${esc(c.name)}">✎</button><button class="mini" data-delcat="${esc(c.name)}">🗑</button>`:''}</div></div>`).join('')};
    const filt=()=>{let r=[...tasks];const q=ui.search.trim().toLowerCase();if(q)r=r.filter(t=>t.title.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));if(ui.filter==='active')r=r.filter(t=>!t.completed);if(ui.filter==='completed')r=r.filter(t=>t.completed);if(ui.filter==='due-soon')r=r.filter(t=>{const s=dueState(t.dueDate,t.completed);return s&&s[0]});r.sort((a,b)=>ui.sort==='oldest'?a.createdAt-b.createdAt:ui.sort==='priority-high'?(b.priority-a.priority)||(b.createdAt-a.createdAt):ui.sort==='priority-low'?(a.priority-b.priority)||(b.createdAt-a.createdAt):b.createdAt-a.createdAt);return r};
    const renderTasks=()=>{const shown=filt(), map=new Map(categories.map(c=>[c.name,[]])); shown.forEach(t=>{if(!map.has(t.category))map.set(t.category,[]); map.get(t.category).push(t)}); const total=tasks.length, done=tasks.filter(t=>t.completed).length, left=total-done, pct=total?Math.round(done/total*100):0; $('total').textContent=total; $('done').textContent=done; $('left').textContent=left; $('pct').textContent=`${pct}% complete`; $('fill').style.width=`${pct}%`; const groups=[...map.entries()].filter(([,arr])=>arr.length); $('groups').innerHTML=groups.length?groups.map(([cat,list])=>`<section class="group"><div class="ghead"><h3><span class="dot" style="background:${catColor(cat)}"></span>${esc(cat)}</h3><span class="count">${list.length} task${list.length===1?'':'s'}</span></div><div class="tasks">${list.map(t=>{const s=dueState(t.dueDate,t.completed);return `<div class="task"><button class="check ${t.completed?'on':''}" data-tog="${t.id}">${t.completed?'✓':''}</button><div><div class="title ${t.completed?'done':''}" data-tog="${t.id}">${esc(t.title)}</div><div class="meta"><span class="pill p${t.priority}">${t.priority===3?'High priority':t.priority===2?'Medium priority':'Low priority'}</span>${t.dueDate?`<span class="pill ${s?s[0]:''}">${s?s[1]+' · ':''}${esc(t.dueDate)}</span>`:''}</div></div><div class="actions"><button class="mini" data-edit="${t.id}">Edit</button><button class="mini" data-deletetask="${t.id}">Del</button></div></div>`}).join('')}</div></section>`).join(''):'<div class="group"><div class="empty">No tasks match your current filters.</div></div>'};
    const openModal=(t=null)=>{if(t){editId=t.id;$('modalTitle').textContent='Edit task';$('saveTask').textContent='Save changes';$('taskTitle').value=t.title;$('taskPri').value=t.priority;$('taskDue').value=t.dueDate||'';updateTaskCat();$('taskCat').value=t.category}else{editId=null;$('modalTitle').textContent='New task';$('saveTask').textContent='Add task';$('taskTitle').value='';$('taskPri').value='2';$('taskDue').value='';updateTaskCat();$('taskCat').value=categories.some(c=>c.name==='General')?'General':categories[0]?.name||''}$('taskBg').classList.add('open'); setTimeout(()=>$('taskTitle').focus(),20)};
    const closeModal=()=>{$('taskBg').classList.remove('open'); editId=null};
    const saveTask=()=>{const title=$('taskTitle').value.trim(); if(!title)return $('taskTitle').focus(); const data={title,category:$('taskCat').value,priority:+$('taskPri').value,dueDate:$('taskDue').value||''}; if(editId) tasks=tasks.map(t=>t.id===editId?{...t,...data}:t); else tasks.unshift({id:crypto.randomUUID(),...data,completed:false,createdAt:Date.now()}); save(); renderTasks(); closeModal()};
    const addCat=()=>{const name=$('catInput').value.trim(); if(!name) return; if(categories.some(c=>c.name.toLowerCase()===name.toLowerCase())) return; categories.push({name,color:colors[categories.length%colors.length]}); $('catInput').value=''; save(); renderCats(); renderTasks()};
    const customCat=(oldName)=>{const cat=categories.find(c=>c.name===oldName); if(!cat) return; let n=prompt('Category name',cat.name); if(n===null) return; const name=n.trim(); if(!name||categories.some(c=>c.name.toLowerCase()===name.toLowerCase()&&c.name!==oldName)) return; let c=prompt('Category color hex',cat.color); if(c===null) return; const color=(c.trim()||cat.color); cat.name=name; cat.color=color; tasks=tasks.map(t=>t.category===oldName?{...t,category:name}:t); save(); renderCats(); renderTasks();};
    const delCat=(name)=>{if(name==='General') return; if(!confirm(`Delete ${name}? Tasks move to General.`)) return; categories=categories.filter(c=>c.name!==name); if(!categories.some(c=>c.name==='General')) categories.unshift({name:'General',color:colors[0]}); tasks=tasks.map(t=>t.category===name?{...t,category:'General'}:t); save(); renderCats(); renderTasks();};
    document.addEventListener('click',e=>{const t=e.target.closest('[data-tog]'); const d=e.target.closest('[data-edit]'); const r=e.target.closest('[data-deletetask]'); const c=e.target.closest('[data-cust]'); const x=e.target.closest('[data-delcat]'); if(t){const id=t.getAttribute('data-tog'); tasks=tasks.map(a=>a.id===id?{...a,completed:!a.completed}:a); save(); renderTasks()} if(d){const id=d.getAttribute('data-edit'); openModal(tasks.find(a=>a.id===id))} if(r){tasks=tasks.filter(a=>a.id!==r.getAttribute('data-deletetask')); save(); renderTasks()} if(c) customCat(c.getAttribute('data-cust')); if(x) delCat(x.getAttribute('data-delcat')); if(e.target.id==='taskBg') closeModal()});
    $('addCatBtn').onclick=addCat; $('catInput').onkeydown=e=>e.key==='Enter'&&addCat(); $('openTask').onclick=()=>openModal(); $('closeTask').onclick=closeModal; $('cancelTask').onclick=closeModal; $('saveTask').onclick=saveTask; $('taskTitle').onkeydown=e=>e.key==='Enter'&&saveTask(); $('search').value=ui.search; $('search').oninput=e=>{ui.search=e.target.value; save(); renderTasks()}; $('filter').value=ui.filter; $('filter').onchange=e=>{ui.filter=e.target.value; save(); renderTasks()}; $('sort').value=ui.sort; $('sort').onchange=e=>{ui.sort=e.target.value; save(); renderTasks()}; $('clearDone').onclick=()=>{tasks=tasks.filter(t=>!t.completed); save(); renderTasks()}; $('themeBtn').onclick=()=>{ui.theme=(document.documentElement.getAttribute('data-theme')==='dark')?'light':'dark'; save(); applyTheme()};
    applyTheme(); renderCats(); renderTasks();
  </script>
</body>
</html>
